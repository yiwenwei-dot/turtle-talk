<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your TurtleTalk sign-in code</title>
</head>
<body style="margin:0;padding:0;background:#f0fdf4;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" role="presentation" style="background:#f0fdf4;padding:40px 16px;">
    <tr>
      <td align="center">
        <table width="100%" cellpadding="0" cellspacing="0" role="presentation" style="max-width:520px;">

          <!-- Logo -->
          <tr>
            <td align="center" style="padding-bottom:28px;">
              <span style="font-size:40px;line-height:1;">🐢</span>
              <div style="margin-top:8px;font-size:20px;font-weight:700;color:#0f766e;letter-spacing:-0.3px;">TurtleTalk</div>
            </td>
          </tr>

          <!-- Card -->
          <tr>
            <td style="background:#ffffff;border-radius:20px;padding:40px 36px;box-shadow:0 4px 24px rgba(15,118,110,0.08);border:1px solid #d1fae5;">
              <h1 style="margin:0 0 10px;font-size:22px;font-weight:700;color:#134e4a;line-height:1.3;">Your sign-in code</h1>
              <p style="margin:0 0 32px;font-size:15px;color:#4b5563;line-height:1.6;">
                Use the code below to sign in to TurtleTalk. It expires in 10 minutes.
              </p>

              <!-- OTP box -->
              <table width="100%" cellpadding="0" cellspacing="0" role="presentation">
                <tr>
                  <td align="center" style="background:#f0fdf4;border:2px solid #6ee7b7;border-radius:14px;padding:24px 16px;">
                    <div style="font-size:40px;font-weight:800;color:#0f766e;letter-spacing:12px;font-family:'Courier New',monospace;">
                      {{ .Token }}
                    </div>
                  </td>
                </tr>
              </table>

              <p style="margin:28px 0 0;font-size:13px;color:#9ca3af;line-height:1.6;">
                If you didn't request this, you can safely ignore this email — someone may have entered your address by mistake.
              </p>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td align="center" style="padding-top:24px;">
              <p style="margin:0;font-size:12px;color:#9ca3af;">
                &copy; TurtleTalk &mdash; helping kids grow through conversation
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
